url: https://winzarh.github.io/LikertMakeR/

template:
  bootstrap: 5
  # bootswatch: litera
  light-switch: true

deploy:
  install_metadata: true

authors:
  WinzarH:
    href: https://github.com/winzarh

home:
  title: "LikertMakeR"
  description: "Synthesise and correlate Likert scale and similar
    rating-scale data with predefined first & second moments
    (mean and standard deviation), Cronbach's Alpha, Factor Loadings,
    and other summary statistics."
  strip_header: true

navbar:
  structure:
    left: [reference, articles, news]
    right: [github]
  components:
    vignettes:
      text: Articles
      menu:
        - text: "LikertMakeR Vignette"
          href: vignettes/LikertMakeR_vignette.html
        # - text: "makeCorrLoadings validation"
        #   href: vignettes/articles/makeCorrLoadings_Validate.html
    articles:
      text: Demonstrations
      menu:
        - text: "makeCorrLoadings validation"
          href: vignettes/articles/makeCorrLoadings_Validate.html


