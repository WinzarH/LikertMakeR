url: https://winzarh.github.io/LikertMakeR/
home:
  title: LikertMakeR
  description: |
    Generate and correlate synthetic Likert-scale data from published summary statistics.
template:
  bootstrap: 5
  bootswatch: materia
  light-switch: yes
  logo: man/figures/logo.png
  favicon: man/figures/logo.png
navbar:
  structure:
    left:
    - home
    - reference
    - articles
    right:
    - search
    - github
    - lightswitch
  components:
    home:
      text: Home
      href: index.html
    reference:
      text: Functions
      href: reference/index.html
    articles:
      text: Vignettes
      menu:
      - text: LikertMakeR examples
        href: articles/LikertMakeR_vignette.html
      - text: makeCorrLoadings Validation
        href: articles/makeCorrLoadings_validate.html
    github:
      icon: fa-github
      href: https://github.com/WinzarH/LikertMakeR
      aria-label: GitHub repository for LikertMakeR
footer:
  structure:
    left: license
    right: developed_by
  components:
    license:
      text: MIT License
      href: LICENSE-text.html
    developed_by:
      text: "Hume Winzar"
      href: authors.html
reference:
  - title: "LikertMakeR functions"
    desc:  "Define dataframe properties and correlations."
  - contents:
    - "lfast"
    - "lcor"
    - "makeItems"
    - "makeCorrAlpha"
    - "makeCorrLoadings"
    - "makeItemsScale"
    - "makePaired"
    - "correlateScales"
  - title: "Helper functions"
    desc: "Check dataframe and correlation properties"
  - contents:
    - "alpha"
    - "eigenvalues"
  - title: Deprecated
    desc: "legacy functions"
  - contents:
    - "lexact"
