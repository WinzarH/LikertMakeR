url: https://winzarh.github.io/LikertMakeR

template:
  bootstrap: 5
  params:
    bootswatch: litera
  favicon: pkgdown/favicon/favicon.ico
  logo: pkgdown/favicon/web-app-manifest-512x512.png
  includes:
    in_header: pkgdown/extra-head.html

navbar:
  title: LikertMakeR
  type: default
  structure:
    left:
      - home
      - reference
      - articles
      - news
    right:
      - github
      - search

home:
  title: LikertMakeR
  sidebar:
    structure:
      - links
      - license
      - community
      - citation

reference:
  - title: Data Generators
    contents:
      - lfast
      - lcor
      - makeScales
      - correlateScales
      - makeItemsScale
      - makePaired
      - makeRepeated
      - makeScalesRegression
  - title: Correlation matrices
    contents:
      - makeCorrAlpha
      - makeCorrLoadings
  - title: Analysis & diagnostics
    contents:
      - alpha
      - eigenvalues
      - reliability
      - alpha_sensitivity
      - ordinal_diagnostics
  - title: Deprecated functions
    contents:
      - lexact
  - title: Internal
    contents:
      - has_keyword("internal")
    internal: true

articles:
  - title: Getting started
    desc: First steps with the package
    contents:
      - LikertMakeR_vignette
      - lfast_infographic

  - title: Tutorials
    desc: Short demonstrations and examples
    contents:
      - likert_scale_defined
      - t_test_demo

  - title: Methods and validation
    desc: Technical explanations and validation studies
    contents:
      - makeCorrAlpha_explainer
      - lfast_validation
      - makeCorrLoadings_validate
      - makeItemsScale_explainer
      - reliability_measures

  - title: Replications and case studies
    contents:
      - cite_LikertMakeR
      - dwivedi_replication



